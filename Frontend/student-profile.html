<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Profile | SkillSync</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .profile-header { padding:120px 0 60px; position:relative; }
    .profile-hero-content { display:flex; gap:32px; align-items:center; }
    .hero-avatar { width:140px; height:140px; border-radius:50%; background:var(--accent-gradient); display:flex; align-items:center; justify-content:center; font-size:3rem; font-weight:bold; color:white; border:4px solid var(--bg-primary); box-shadow:0 0 0 2px var(--accent-purple); }
    .skills-scroller { display:flex; gap:12px; flex-wrap:wrap; margin-top:16px; }
    .skill-tag { padding:6px 16px; background:rgba(255,255,255,0.05); border:1px solid var(--border-glass); border-radius:var(--radius-full); font-size:0.9rem; color:var(--text-secondary); }
    .content-grid { display:grid; grid-template-columns:2fr 1fr; gap:32px; padding-bottom:80px; }
    .public-status-banner { width:100%; padding:24px; border-radius:var(--radius-lg); margin-bottom:32px; display:flex; gap:16px; align-items:flex-start; background:var(--bg-glass); border:1px solid var(--border-glass); }
    .history-card { padding:24px; border-bottom:1px solid var(--border-glass); }
    .history-card:last-child { border-bottom:none; }
  </style>
</head>
<body>
  <nav class="glass-nav">
    <div class="container navbar">
      <a href="index.html" class="logo">SkillSync</a>
      <div class="nav-links flex items-center">
        <a href="browse-students.html">Browse</a>
      </div>
    </div>
  </nav>
  <header class="profile-header container animate-fade">
    <div class="profile-hero-content">
      <div class="hero-avatar" id="profileInitials">?</div>
      <div style="flex:1;">
        <div class="flex items-center gap-4 mb-2">
          <h1 id="studentName" style="font-size:3rem;">Loading...</h1>
          <div class="status-badge" style="background:rgba(59,130,246,0.1);border-color:rgba(59,130,246,0.3);color:var(--accent-blue);">
            Score: <span id="studentScore">0</span>/100
          </div>
        </div>
        <p id="studentBio" class="text-secondary" style="font-size:1.2rem;max-width:600px;">—</p>
        <div id="studentSkills" class="skills-scroller"></div>
      </div>
    </div>
  </header>
  <main class="container content-grid animate-fade" style="animation-delay:0.2s;">
    <div>
      <div class="public-status-banner" id="publicAvailabilityBanner">
        <div id="statusIcon" style="font-size:2rem;">🟢</div>
        <div>
          <h3 id="publicStatusTitle" style="color:var(--status-available);margin-bottom:4px;">Available for tasks</h3>
          <p id="publicStatusDesc" class="text-secondary">This student is free to accept new opportunities.</p>
        </div>
      </div>
      <h3 class="mb-4">Completed Tasks</h3>
      <div class="glass-panel" style="padding:0;" id="tasksList">
        <div style="padding:40px;text-align:center;color:var(--text-secondary);">Loading tasks...</div>
      </div>
    </div>
    <aside>
      <div class="glass-panel text-center">
        <h3 class="mb-4">Interested?</h3>
        <p class="text-secondary mb-6 text-sm">Assign a micro-internship task directly to this student.</p>
        <a href="company-dashboard.html" class="btn btn-primary" style="width:100%;display:block;text-align:center;">Go to Dashboard</a>
      </div>
    </aside>
  </main>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script>
    async function loadStudentProfile() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get("id");
      if (!id) { document.getElementById("studentName").textContent = "No student selected"; return; }
      try {
        const { student, tasks } = await apiRequest(`/users/students/${id}`);
        if (!student) { document.getElementById("studentName").textContent = "Student not found"; return; }

        const initials = ((student.firstName||student.name||"?")[0]+((student.lastName||"")[0]||"")).toUpperCase();
        document.getElementById("profileInitials").textContent = initials;
        document.getElementById("studentName").textContent = student.name || `${student.firstName} ${student.lastName}`;
        document.getElementById("studentBio").textContent = student.bio || student.profileTitle || "—";
        document.getElementById("studentScore").textContent = student.verifiedScore || 0;

        if (student.skills?.length) {
          document.getElementById("studentSkills").innerHTML = student.skills.map(s=>`<span class="skill-tag">${s}</span>`).join("");
        }

        const status = student.availability?.status || "available";
        const statusIcon = { available:"🟢", busy:"🔴", soon:"🟡" }[status] || "🟢";
        const statusColor = { available:"var(--status-available)", busy:"var(--status-busy)", soon:"var(--status-soon)" }[status];
        const statusTitle = status==="available" ? "Available for tasks" : status==="busy" ? `Busy on: ${student.availability.currentProjectName||"a project"}` : `Available in ${student.availability.availableInDays||"?"} days`;
        const statusDesc = status==="available" ? "This student is free to accept new opportunities." : status==="busy" ? "Currently working on a project." : "Will be free soon.";

        document.getElementById("statusIcon").textContent = statusIcon;
        document.getElementById("publicStatusTitle").style.color = statusColor;
        document.getElementById("publicStatusTitle").textContent = statusTitle;
        document.getElementById("publicStatusDesc").textContent = statusDesc;

        const tasksList = document.getElementById("tasksList");
        if (!tasks?.length) {
          tasksList.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-secondary);">No completed tasks yet.</div>';
        } else {
          tasksList.innerHTML = tasks.map(t => `
            <div class="history-card">
              <div class="flex justify-between items-center mb-2">
                <h4>${t.title} <span style="color:var(--accent-blue);font-size:0.9rem;">($${t.budget||0})</span></h4>
                <span class="text-secondary" style="font-size:0.9rem;">${t.createdAt ? new Date(t.createdAt).toLocaleDateString() : ""}</span>
              </div>
              <p class="text-secondary">${t.company?.name || "Company"}</p>
            </div>
          `).join("");
        }
      } catch(e) {
        document.getElementById("studentName").textContent = "Error loading profile";
        console.error(e);
      }
    }
    loadStudentProfile();
  </script>
</body>
</html>
