<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Details | SkillSync</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .project-header {
      padding-top: 120px;
      padding-bottom: 40px;
      border-bottom: 1px solid var(--border-glass);
      margin-bottom: 40px;
    }

    .two-col {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 40px;
    }

    .tag {
      padding: 4px 12px;
      background: rgba(255,255,255,0.05);
      border-radius: 4px;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }
  </style>
</head>
<body>

  <nav class="glass-nav">
    <div class="container navbar">
      <a href="#" onclick="window.history.back()" class="flex items-center gap-2 text-secondary hover:text-primary">
        <span>← Back</span>
      </a>
      <div class="logo">SkillSync</div>
      <div class="nav-links flex items-center" id="navLinks">
        <!-- Rendered by JS -->
      </div>
    </div>
  </nav>

  <div id="contentWrapper">
    <div style="padding: 120px; text-align: center; color: var(--text-secondary);">Loading project details...</div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script>
    if (!getToken()) window.location.href = "login.html";
    const user = getUser();
    
    const navLinks = document.getElementById("navLinks");
    if (user.role === 'student') {
      navLinks.innerHTML = '<a href="student-dashboard.html">Dashboard</a><a href="chat.html">Messages</a>';
    } else {
      navLinks.innerHTML = '<a href="company-dashboard.html">Dashboard</a><a href="chat.html">Messages</a>';
    }

    async function loadProject() {
      const params = new URLSearchParams(window.location.search);
      const taskId = params.get("id");
      if (!taskId) {
        document.getElementById("contentWrapper").innerHTML = "<div style='padding: 120px; text-align: center;'>No project specified.</div>";
        return;
      }

      try {
        const task = await apiRequest(`/tasks/${taskId}`);
        renderProject(task);
      } catch (e) {
        document.getElementById("contentWrapper").innerHTML = `<div style='padding: 120px; text-align: center; color:#ef4444;'>${e.message}</div>`;
      }
    }

    function renderProject(task) {
      const isCompany = user.role === 'company';
      
      const companyName = task.company?.name || task.company?.companyName || "Company";
      const studentName = task.assignedStudent ? task.assignedStudent.name : "Unassigned";
      
      let actionPanel = '';
      
      if (task.status === 'completed') {
        actionPanel = `
          <h4 class="mb-4">Status</h4>
          <div class="status-badge" style="color:#10b981; border-color:rgba(16,185,129,0.3); justify-content:center;">Completed</div>
        `;
      } else {
        if (isCompany) {
          actionPanel = `
            <h4 class="mb-4">Company Actions</h4>
            <p class="text-secondary mb-4" style="font-size: 0.85rem;">Manage the task and communicate with the talent.</p>
            ${task.assignedStudent ? `
              <a href="chat.html?taskId=${task._id}" class="btn btn-secondary" style="width: 100%; margin-bottom: 12px; display:block; text-align:center;">Message ${studentName}</a>
              <button class="btn btn-primary" style="width: 100%; background: #10b981; border: none;" onclick="markCompleted('${task._id}')">Approve & Complete</button>
            ` : `
              <p class="text-secondary mb-4" style="font-size: 0.85rem;">No student assigned yet.</p>
              <a href="browse-students.html" class="btn btn-primary" style="width: 100%; display:block; text-align:center;">Find Talent</a>
            `}
          `;
        } else {
          // Student
          if (task.assignedStudent && task.assignedStudent._id === user.id) {
            actionPanel = `
              <h4 class="mb-4">Update Status</h4>
              <p class="text-secondary mb-4" style="font-size: 0.85rem;">Communicate with the company and submit your work.</p>
              <a href="chat.html?taskId=${task._id}" class="btn btn-secondary" style="width: 100%; margin-bottom: 12px; display:block; text-align:center;">Message ${companyName}</a>
            `;
          } else {
            actionPanel = `
              <h4 class="mb-4">Open Opportunity</h4>
              <p class="text-secondary mb-4" style="font-size: 0.85rem;">This task is available. Wait for a company to assign it to you.</p>
            `;
          }
        }
      }

      document.getElementById("contentWrapper").innerHTML = `
        <header class="container project-header animate-fade">
          <div class="flex justify-between items-start mb-4">
            <div>
              <div class="flex gap-2 mb-4">
                <span class="tag">$${task.budget || 0} Budget</span>
                ${task.primarySkill ? `<span class="tag">${task.primarySkill}</span>` : ""}
              </div>
              <h1 style="font-size: 2.5rem; margin-bottom: 8px;">${task.title}</h1>
              <p class="text-secondary" style="font-size: 1.1rem;">${companyName}</p>
            </div>
            <div class="status-badge" style="padding: 8px 16px; font-size: 1rem; ${task.status==='completed'?'color:#10b981; border-color:rgba(16,185,129,0.3);':''}">
              ${task.status}
            </div>
          </div>
        </header>

        <main class="container two-col animate-fade" style="animation-delay: 0.2s;">
          <div>
            <h3 class="mb-4">Description</h3>
            <p class="text-secondary mb-6" style="white-space: pre-line;">${task.description || "No description provided."}</p>
            ${task.dueDate ? `<p class="text-secondary mb-6"><strong>Due Date:</strong> ${new Date(task.dueDate).toLocaleDateString()}</p>` : ""}
          </div>

          <aside>
            <div class="glass-panel mb-6">
              <h4 class="mb-4 text-secondary">Assignee</h4>
              <div class="flex items-center gap-3">
                <div class="avatar-sm" style="width:40px;height:40px; border-radius:50%; background:var(--accent-gradient); display:flex; align-items:center; justify-content:center; color:white; font-weight:bold;">
                  ${studentName !== "Unassigned" ? studentName[0].toUpperCase() : "?"}
                </div>
                <div>
                  <h4 style="font-size: 1rem;">${studentName}</h4>
                  ${task.assignedStudent ? `<a href="student-profile.html?id=${task.assignedStudent._id}" class="text-gradient" style="font-size: 0.85rem;">View Profile</a>` : ""}
                </div>
              </div>
            </div>

            <div class="glass-panel" id="actionPanel">
              ${actionPanel}
            </div>
          </aside>
        </main>
      `;
    }

    async function markCompleted(taskId) {
      if (!confirm("Are you sure you want to mark this task as completed?")) return;
      try {
        await apiRequest(`/tasks/${taskId}/status`, {
          method: "PUT",
          body: JSON.stringify({ status: "completed" })
        });
        loadProject();
      } catch (e) {
        alert("Failed to complete task: " + e.message);
      }
    }

    loadProject();
  </script>
</body>
</html>
