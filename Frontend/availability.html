<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Availability | SkillSync</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .availability-card { max-width:600px; margin:100px auto 40px; }
    .status-selector { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:32px; }
    .status-btn { padding:16px; border:1px solid var(--border-glass); border-radius:var(--radius-md); background:rgba(255,255,255,0.02); transition:all var(--transition-fast); cursor:pointer; }
    .status-btn:hover { background:rgba(255,255,255,0.05); }
    .status-btn.selected { background:rgba(255,255,255,0.08); transform:translateY(-2px); }
    .status-btn[data-status="available"].selected { box-shadow:inset 0 0 0 1px var(--status-available); }
    .status-btn[data-status="busy"].selected { box-shadow:inset 0 0 0 1px var(--status-busy); }
    .status-btn[data-status="soon"].selected { box-shadow:inset 0 0 0 1px var(--status-soon); }
    .status-icon { font-size:1.5rem; margin-bottom:8px; }
    .dynamic-form-section { display:none; border-top:1px solid var(--border-glass); padding-top:24px; margin-top:24px; }
  </style>
</head>
<body>
  <nav class="glass-nav">
    <div class="container flex justify-between items-center" style="height:80px;">
      <a href="student-dashboard.html" class="text-secondary">← Back to Dashboard</a>
      <div class="logo">SkillSync</div>
      <div style="width:150px;"></div>
    </div>
  </nav>
  <div class="container animate-fade">
    <div class="glass-panel availability-card">
      <div class="text-center mb-8">
        <h2>Set Your Availability</h2>
        <p class="text-secondary mt-2">Let recruiters know when you can take on new micro-internships.</p>
      </div>
      <div id="errorMessage" style="color:#ef4444;margin-bottom:16px;display:none;"></div>
      <div class="status-selector" id="statusSelector">
        <button class="status-btn selected" data-status="available"><div class="status-icon">🟢</div><h4 style="font-size:1rem;margin-bottom:4px;">Available</h4><p class="text-secondary" style="font-size:0.8rem;">Ready for tasks</p></button>
        <button class="status-btn" data-status="busy"><div class="status-icon">🔴</div><h4 style="font-size:1rem;margin-bottom:4px;">Busy</h4><p class="text-secondary" style="font-size:0.8rem;">Currently working</p></button>
        <button class="status-btn" data-status="soon"><div class="status-icon">🟡</div><h4 style="font-size:1rem;margin-bottom:4px;">Soon</h4><p class="text-secondary" style="font-size:0.8rem;">Available shortly</p></button>
      </div>
      <div class="dynamic-form-section" id="busyForm">
        <h4 class="mb-4">What are you working on?</h4>
        <div class="form-group" style="text-align:left;"><label class="form-label">Current Project Name</label><input type="text" id="statusProject" class="form-control" placeholder="e.g. Building backend API"></div>
        <div class="form-group" style="text-align:left;"><label class="form-label">Expected Completion Date</label><input type="date" id="statusDate" class="form-control"></div>
      </div>
      <div class="dynamic-form-section" id="soonForm">
        <h4 class="mb-4">When will you be free?</h4>
        <div class="form-group" style="text-align:left;"><label class="form-label">Available in (Days)</label><input type="number" id="statusDays" class="form-control" placeholder="e.g. 3" min="1" max="14"></div>
      </div>
      <button class="btn btn-primary mt-4" id="saveBtn" style="width:100%;" onclick="saveAvailability()">Update Availability</button>
    </div>
  </div>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script>
    if (!getToken()) window.location.href = "login.html";

    let currentSelection = "available";

    document.querySelectorAll(".status-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".status-btn").forEach(b => b.classList.remove("selected"));
        btn.classList.add("selected");
        currentSelection = btn.getAttribute("data-status");
        document.getElementById("busyForm").style.display = "none";
        document.getElementById("soonForm").style.display = "none";
        if (currentSelection === "busy") document.getElementById("busyForm").style.display = "block";
        if (currentSelection === "soon") document.getElementById("soonForm").style.display = "block";
      });
    });

    async function saveAvailability() {
      const errorMsg = document.getElementById("errorMessage");
      const btn = document.getElementById("saveBtn");
      errorMsg.style.display = "none";
      btn.textContent = "Saving...";
      btn.disabled = true;

      const body = { status: currentSelection };
      if (currentSelection === "busy") {
        body.currentProjectName = document.getElementById("statusProject").value;
        body.expectedCompletion = document.getElementById("statusDate").value || undefined;
      } else if (currentSelection === "soon") {
        body.availableInDays = Number(document.getElementById("statusDays").value) || undefined;
      }

      try {
        await apiRequest("/availability", {
          method: "PATCH",
          body: JSON.stringify(body)
        });
        btn.textContent = "Saved ✔";
        btn.style.background = "var(--status-available)";
        setTimeout(() => window.location.href = "student-dashboard.html", 1000);
      } catch(e) {
        errorMsg.textContent = e.message;
        errorMsg.style.display = "block";
        btn.textContent = "Update Availability";
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
