<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | SkillSync</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .auth-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; position: relative; }
    .auth-container::before { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 600px; height: 600px; background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, rgba(15, 17, 26, 0) 70%); z-index: -1; }
    .auth-card { width: 100%; max-width: 440px; text-align: center; }
    .role-toggle { display: flex; background: rgba(255,255,255,0.05); border-radius: var(--radius-md); padding: 4px; margin-bottom: 24px; }
    .role-btn { flex: 1; padding: 10px; color: var(--text-secondary); border-radius: var(--radius-md); transition: all var(--transition-fast); font-weight: 500; font-size: 0.9rem; }
    .role-btn.active { background: var(--bg-primary); color: var(--text-primary); box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
  </style>
</head>
<body>
  <nav class="glass-nav">
    <div class="container navbar">
      <a href="index.html" class="logo">SkillSync</a>
      <div class="nav-links"><a href="index.html">Home</a><a href="register.html">Sign Up</a></div>
    </div>
  </nav>
  <div class="auth-container animate-fade">
    <div class="glass-panel auth-card">
      <h2 style="font-size: 2rem; margin-bottom: 8px;">Welcome Back</h2>
      <p class="text-secondary mb-6">Log in to your SkillSync account.</p>
      <div class="role-toggle" id="loginRoleToggle">
        <button class="role-btn active" data-role="student">Student</button>
        <button class="role-btn" data-role="company">Company</button>
      </div>
      <form id="loginForm">
        <div id="errorMessage" style="color:#ef4444;margin-bottom:16px;font-size:0.9rem;display:none;"></div>
        <div class="form-group" style="text-align:left;">
          <label class="form-label">Email Address</label>
          <input type="email" id="email" class="form-control" placeholder="name@example.com" required>
        </div>
        <div class="form-group" style="text-align:left;">
          <label class="form-label">Password</label>
          <input type="password" id="password" class="form-control" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px;">Log In</button>
      </form>
      <p class="mt-6 text-secondary" style="font-size:0.9rem;">Don't have an account? <a href="register.html" style="color:var(--accent-blue);">Sign up</a></p>
    </div>
  </div>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.querySelectorAll(".role-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".role-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
      });
    });
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const role = document.querySelector(".role-btn.active").dataset.role;
      const errorMsg = document.getElementById("errorMessage");
      errorMsg.style.display = "none";
      try {
        const data = await apiRequest("/auth/login", {
          method: "POST",
          body: JSON.stringify({ email, password, role })
        });
        setToken(data.token);
        setUser(data.user);
        window.location.href = data.user.role === "student" ? "student-dashboard.html" : "company-dashboard.html";
      } catch (error) {
        errorMsg.textContent = error.message;
        errorMsg.style.display = "block";
      }
    });
  </script>
</body>
</html>
